        <!--сама форма записи-->
        <form class="form-record">
            <div class="container">
                <div class="row">
                    <div class="col-sm-3">
                        <h1>Запись</h1>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label for="exampleFormControlInput1">Имя</label>
                            <label class="redzvezda" for="exampleFormControlInput1">*</label>
                            <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="Пример: Иван">
                          </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label for="exampleFormControlInput2">Телефон</label>
                            <label class="redzvezda" for="exampleFormControlInput2">*</label>
                            <input type="email" class="form-control" id="exampleFormControlInput2" placeholder="Пример: 8 888 888 88 88">
                          </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label for="exampleFormControlInput3">E-mail</label>
                            <label class="redzvezda" for="exampleFormControlInput3">*</label>
                            <input type="email" class="form-control" id="exampleFormControlInput3" placeholder="Пример: ivan@mail.ru">
                          </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label for="exampleFormControlSelect1">Услуга</label>
                            <select class="form-control" id="exampleFormControlSelect1">
                              <option>1</option>
                              <option>2</option>
                              <option>3</option>
                              <option>4</option>
                              <option>5</option>
                            </select>
                          </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label for="exampleFormControlInput4">Комментарий</label>
                            <textarea class="form-control" id="exampleFormControlTextarea1" rows="2"></textarea>
                          </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <hr>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <label class="redzvezda" for="exampleFormControlInput4">*</label>
                        <label for="exampleFormControlInput4">- поля обязательные к заполнению </label>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6">
                        <button type="button" class="btn btn-primary">Отправить</button>
                    </div>
                </div> 
            </div>
        </form>
